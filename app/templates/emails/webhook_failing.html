<html>
  <body style="margin:0;background:#120A14;font-family:Arial,sans-serif;color:#291815;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#120A14;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;">
          <tr><td style="padding:28px 32px;border-radius:28px 28px 0 0;background:linear-gradient(135deg,#FF6F7D 0%,#FF6B35 55%,#FFD23F 100%);color:#20110B;">
            <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;">Webhook warning</div>
            <h1 style="margin:16px 0 8px;font-size:38px;line-height:1;letter-spacing:-0.05em;">A delivery endpoint is failing.</h1>
            <p style="margin:0;font-size:18px;line-height:1.45;">Fix it before the event stream goes dark.</p>
          </td></tr>
          <tr><td style="background:#FFF8F2;border-radius:0 0 28px 28px;padding:32px;">
            <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#6F5048;">Hi $name, this endpoint has failed <strong>$failure_count consecutive times</strong>:</p>
            <div style="padding:16px 18px;border-radius:20px;background:#FFF1E6;border:1px solid #F1D5C6;font-family:'Courier New',monospace;font-size:13px;line-height:1.6;color:#6F5048;">$webhook_url</div>
            <p style="margin:18px 0 0;font-size:15px;line-height:1.7;color:#6F5048;">After 10 consecutive failures, the webhook will be disabled automatically.</p>
            <table role="presentation" cellspacing="0" cellpadding="0" style="margin-top:24px;">
              <tr><td style="border-radius:18px;background:linear-gradient(135deg,#FF6B35 0%,#FFD23F 60%,#06FFA5 100%);">
                <a href="$dashboard_url" style="display:inline-block;padding:14px 24px;color:#20110B;text-decoration:none;font-weight:700;">Manage webhooks</a>
              </td></tr>
            </table>
          </td></tr>
          <tr><td style="padding:18px 10px 0;text-align:center;font-size:12px;line-height:1.7;color:#B9A79D;"><a href="$unsubscribe_url" style="color:#FFD23F;text-decoration:none;">Unsubscribe</a> · $support_email</td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
