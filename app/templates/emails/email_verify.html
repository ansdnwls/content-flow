<html>
  <body style="margin:0;background:#120A14;font-family:Arial,sans-serif;color:#291815;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#120A14;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;">
          <tr><td style="padding:28px 32px;border-radius:28px 28px 0 0;background:linear-gradient(135deg,#FF6B35 0%,#FFD23F 58%,#06FFA5 100%);color:#20110B;">
            <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;">Verify email</div>
            <h1 style="margin:16px 0 8px;font-size:38px;line-height:1;letter-spacing:-0.05em;">Confirm your email, $name.</h1>
            <p style="margin:0;font-size:18px;line-height:1.45;">One quick click and your workspace is ready.</p>
          </td></tr>
          <tr><td style="background:#FFF8F2;border-radius:0 0 28px 28px;padding:32px;">
            <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#6F5048;">Click below to verify your email address. This link expires in 24 hours.</p>
            <table role="presentation" cellspacing="0" cellpadding="0">
              <tr><td style="border-radius:18px;background:linear-gradient(135deg,#FF6B35 0%,#FFD23F 60%,#06FFA5 100%);">
                <a href="$verify_url" style="display:inline-block;padding:14px 24px;color:#20110B;text-decoration:none;font-weight:700;">Verify email</a>
              </td></tr>
            </table>
            <p style="margin:18px 0 0;font-size:14px;color:#8F6D65;">If you didn&apos;t create an account, you can safely ignore this email.</p>
          </td></tr>
          <tr><td style="padding:18px 10px 0;text-align:center;font-size:12px;line-height:1.7;color:#B9A79D;">$support_email</td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
