<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0c0f23;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;padding:40px 20px">
<tr><td style="text-align:center;padding-bottom:32px">
  <div style="display:inline-block;width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#ff6b35,#9a6bff);line-height:48px;font-size:24px;color:#20110b">⚡</div>
  <h1 style="color:#f0eef6;margin:16px 0 0;font-size:28px">웹훅 엔드포인트에 문제가 있습니다</h1>
</td></tr>
<tr><td style="background:rgba(151,164,255,0.06);border:1px solid rgba(151,164,255,0.12);border-radius:24px;padding:32px">
  <p style="color:#aab3d8;font-size:15px;line-height:1.6;margin:0 0 16px">$name님, 다음 엔드포인트가 $failure_count회 연속 실패했습니다:</p>
  <div style="background:#0c0f23;border:1px solid rgba(151,164,255,0.16);border-radius:10px;padding:12px 16px;margin:0 0 16px;overflow:auto">
    <code style="color:#9a6bff;font-size:13px;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;word-break:break-all">$webhook_url</code>
  </div>
  <p style="color:#6b7294;font-size:13px;line-height:1.5;margin:0 0 24px">10회 연속 실패 시 웹훅이 자동으로 비활성화됩니다.</p>
  <a href="$dashboard_url" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#ff6b35,#9a6bff);color:#20110b;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px">웹훅 관리</a>
</td></tr>
<tr><td style="padding-top:32px;text-align:center">
  <p style="color:#6b7294;font-size:13px;margin:0">ContentFlow · <a href="$docs_url" style="color:#9a6bff;text-decoration:none">문서</a> · <a href="$unsubscribe_url" style="color:#6b7294;text-decoration:none">구독 해제</a></p>
</td></tr>
</table>
</body>
</html>
