<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0c0f23;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;padding:40px 20px">
<tr><td style="text-align:center;padding-bottom:32px">
  <div style="display:inline-block;width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#ff6b35,#9a6bff);line-height:48px;font-size:24px;color:#20110b">⚡</div>
  <h1 style="color:#f0eef6;margin:16px 0 0;font-size:28px">Webhook Endpoint Failing</h1>
</td></tr>
<tr><td style="background:rgba(151,164,255,0.06);border:1px solid rgba(151,164,255,0.12);border-radius:24px;padding:32px">
  <p style="color:#aab3d8;font-size:15px;line-height:1.6;margin:0 0 16px">Hi $name,</p>
  <p style="color:#aab3d8;font-size:15px;line-height:1.6;margin:0 0 16px">This endpoint has failed <strong style="color:#ff6b35">$failure_count</strong> consecutive times:</p>
  <p style="margin:0 0 16px;padding:10px 14px;background:#090c1c;border:1px solid rgba(151,164,255,0.15);border-radius:8px;font-family:monospace;font-size:13px;color:#aab3d8;word-break:break-all">$webhook_url</p>
  <p style="color:#aab3d8;font-size:14px;line-height:1.6;margin:0 0 24px;padding:12px 16px;background:rgba(154,107,255,0.08);border:1px solid rgba(154,107,255,0.2);border-radius:10px">After 10 consecutive failures, the webhook will be disabled automatically.</p>
  <a href="$dashboard_url" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#ff6b35,#9a6bff);color:#20110b;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px">Manage Webhooks</a>
</td></tr>
<tr><td style="padding-top:32px;text-align:center">
  <p style="color:#6b7294;font-size:13px;margin:0">ContentFlow · <a href="$docs_url" style="color:#9a6bff;text-decoration:none">Docs</a> · <a href="$unsubscribe_url" style="color:#6b7294;text-decoration:none">Unsubscribe</a></p>
</td></tr>
</table>
</body>
</html>
