<html>
  <body style="margin:0;background:#120A14;font-family:Arial,sans-serif;color:#291815;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#120A14;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;">
          <tr><td style="padding:28px 32px;border-radius:28px 28px 0 0;background:linear-gradient(135deg,#FF6B35 0%,#FFD23F 58%,#06FFA5 100%);color:#20110B;">
            <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;">Plan upgraded</div>
            <h1 style="margin:16px 0 8px;font-size:38px;line-height:1;letter-spacing:-0.05em;">You unlocked a bigger burst.</h1>
            <p style="margin:0;font-size:18px;line-height:1.45;">Higher limits, more headroom, same workflow.</p>
          </td></tr>
          <tr><td style="background:#FFF8F2;border-radius:0 0 28px 28px;padding:32px;">
            <p style="margin:0 0 18px;font-size:16px;line-height:1.7;color:#6F5048;">Hi $name, your plan changed from <strong>$old_plan</strong> to <strong>$new_plan</strong>.</p>
            <div style="padding:16px 18px;border-radius:20px;background:#EFFFF8;border:1px solid #B9F1D7;color:#0E8F61;font-size:15px;line-height:1.6;">New limits and upgraded features are live in the dashboard now.</div>
            <table role="presentation" cellspacing="0" cellpadding="0" style="margin-top:24px;">
              <tr><td style="border-radius:18px;background:linear-gradient(135deg,#FF6B35 0%,#FFD23F 60%,#06FFA5 100%);">
                <a href="$dashboard_url" style="display:inline-block;padding:14px 24px;color:#20110B;text-decoration:none;font-weight:700;">View dashboard</a>
              </td></tr>
            </table>
          </td></tr>
          <tr><td style="padding:18px 10px 0;text-align:center;font-size:12px;line-height:1.7;color:#B9A79D;"><a href="$unsubscribe_url" style="color:#FFD23F;text-decoration:none;">Unsubscribe</a> · $support_email</td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
