name: Smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate smoke secrets
        run: |
          test -n "${{ secrets.SUPABASE_URL }}"
          test -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

      - name: Create smoke .env
        run: |
          cat > .env <<EOF
          APP_ENV=development
          APP_NAME=ContentFlow API
          LOG_LEVEL=INFO
          STRUCTURED_LOGGING_ENABLED=true
          PROMETHEUS_ENABLED=true
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL=redis://127.0.0.1:6379/0
          CELERY_BROKER_URL=redis://127.0.0.1:6379/1
          CELERY_RESULT_BACKEND=redis://127.0.0.1:6379/2
          JWT_SECRET=smoke-ci-secret
          EOF

      - name: Start docker compose
        run: docker compose up -d --build

      - name: Run smoke test
        env:
          CONTENTFLOW_BASE_URL: http://127.0.0.1:8000
        run: python scripts/smoke_test.py --report-path scripts/smoke_test_results.generated.md

      - name: Capture docker logs
        if: always()
        run: docker compose logs --no-color > smoke-docker.log

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            scripts/smoke_test_results.generated.md
            smoke-docker.log

      - name: Stop docker compose
        if: always()
        run: docker compose down -v
