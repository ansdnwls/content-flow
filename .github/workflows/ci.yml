name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  python-api:
    name: Python API
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Pytest with coverage
        run: pytest -q --timeout=60 --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Pytest last failed
        if: failure()
        run: pytest -q --lf --timeout=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-api-coverage
          path: coverage.xml

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run SDK tests
        run: pytest -q

  javascript-sdk:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/javascript

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/javascript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SDK tests
        run: npm test

      - name: TypeScript check
        run: npm run typecheck

  go-sdk:
    name: Go SDK
    if: ${{ hashFiles('sdk/go/go.mod') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sdk/go/go.mod

      - name: Run Go tests
        run: go test ./...

  landing:
    name: Landing
    if: ${{ hashFiles('landing/package-lock.json') != '' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build landing site
        run: npm run build
