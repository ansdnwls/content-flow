name: Deploy Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_PROJECT_ID != '' && secrets.RAILWAY_ENVIRONMENT_ID != '' && secrets.RAILWAY_SERVICE_ID != '' && secrets.RAILWAY_HEALTHCHECK_URL != '' }}
    runs-on: ubuntu-latest
    concurrency:
      group: railway-production
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_SERVICE_REF: ${{ secrets.RAILWAY_SERVICE_NAME || secrets.RAILWAY_SERVICE_ID }}
      RAILWAY_HEALTHCHECK_URL: ${{ secrets.RAILWAY_HEALTHCHECK_URL }}
      RAILWAY_GRAPHQL_URL: https://backboard.railway.app/graphql/v2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Capture current successful deployment
        id: previous
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          query = """
          query latestDeployment($input: DeploymentListInput!) {
            deployments(input: $input, first: 1) {
              edges {
                node {
                  id
                  status
                  url
                  createdAt
                }
              }
            }
          }
          """

          payload = {
              "query": query,
              "variables": {
                  "input": {
                      "projectId": os.environ["RAILWAY_PROJECT_ID"],
                      "serviceId": os.environ["RAILWAY_SERVICE_ID"],
                      "environmentId": os.environ["RAILWAY_ENVIRONMENT_ID"],
                      "status": {"successfulOnly": True},
                  }
              },
          }
          body = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              os.environ["RAILWAY_GRAPHQL_URL"],
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['RAILWAY_TOKEN']}",
                  "Project-Access-Token": os.environ["RAILWAY_TOKEN"],
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              result = json.load(response)

          edges = result.get("data", {}).get("deployments", {}).get("edges", [])
          deployment = edges[0]["node"] if edges else {}
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"deployment_id={deployment.get('id', '')}\n")
              handle.write(f"deployment_url={deployment.get('url', '')}\n")
          PY

      - name: Deploy with Railway CLI
        run: railway up --ci --service "$RAILWAY_SERVICE_REF" --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID"

      - name: Wait for readiness health check
        run: |
          python <<'PY'
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          url = os.environ["RAILWAY_HEALTHCHECK_URL"]
          deadline = time.time() + 300

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"Health check passed: {url}")
                          sys.exit(0)
              except urllib.error.HTTPError as exc:
                  print(f"Health check returned HTTP {exc.code}")
              except Exception as exc:
                  print(f"Health check not ready: {exc}")

              time.sleep(10)

          print(f"Health check failed: {url}")
          sys.exit(1)
          PY

      - name: Roll back previous deployment
        if: failure() && steps.previous.outputs.deployment_id != ''
        env:
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request

          mutation = """
          mutation deploymentRollback($id: String!) {
            deploymentRollback(id: $id) {
              id
              status
            }
          }
          """

          payload = {
              "query": mutation,
              "variables": {"id": os.environ["PREVIOUS_DEPLOYMENT_ID"]},
          }
          body = json.dumps(payload).encode("utf-8")
          request = urllib.request.Request(
              os.environ["RAILWAY_GRAPHQL_URL"],
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['RAILWAY_TOKEN']}",
                  "Project-Access-Token": os.environ["RAILWAY_TOKEN"],
              },
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              result = json.load(response)

          print(json.dumps(result))
          if result.get("errors"):
              raise SystemExit("Railway rollback failed")
          PY

      - name: Verify rollback health check
        if: failure() && steps.previous.outputs.deployment_id != ''
        run: |
          python <<'PY'
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          url = os.environ["RAILWAY_HEALTHCHECK_URL"]
          deadline = time.time() + 300

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"Rollback health check passed: {url}")
                          sys.exit(0)
              except urllib.error.HTTPError as exc:
                  print(f"Rollback health check returned HTTP {exc.code}")
              except Exception as exc:
                  print(f"Rollback health check not ready: {exc}")

              time.sleep(10)

          print(f"Rollback health check failed: {url}")
          sys.exit(1)
          PY
