name: Security Checks

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 06:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run secret scanner
        run: python scripts/secret_scan.py --git

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r pyproject.toml --desc || true

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run security tests
        run: pytest tests/test_security/ -v --tb=short
